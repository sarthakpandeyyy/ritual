<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ritual CV Website</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap"
rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:'Space Grotesk',sans-serif;
background:#030303;
overflow-x:hidden;
}

.bg-grid{
background-size:40px 40px;
background-image:
linear-gradient(to right,rgba(255,0,0,.06) 1px,transparent 1px),
linear-gradient(to bottom,rgba(255,0,0,.06) 1px,transparent 1px);
}

.role-badge{
padding:10px 16px;
border-radius:14px;
font-weight:700;
font-size:14px;
border:1px solid;
text-transform:uppercase;
}

</style>
</head>

<body class="text-white bg-grid min-h-screen">

<!-- TOP GLOW -->

<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[250px] bg-red-600/10 blur-[90px] rounded-full"></div>

<!-- HEADER -->

<header class="border-b border-red-900/40 bg-black/60 backdrop-blur-md sticky top-0 z-50 px-5 py-4">

<div class="max-w-7xl mx-auto flex items-center justify-between">

<div class="flex items-center gap-3">

<div class="w-11 h-11 border border-red-600 rounded-xl flex items-center justify-center">

<i class="fa-brands fa-codepen text-white text-xl"></i>

</div>

<h1 class="text-4xl font-black tracking-wide">

RITUAL <span class="text-red-600">CV WEBSITE</span>

</h1>

</div>

<button class="border border-red-600 text-red-500 rounded-2xl px-6 py-3">

0xf94f...4248

</button>

</div>

</header>

<!-- MAIN -->

<main class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-8 px-6 py-10">

<!-- LEFT -->

<div class="bg-black/80 border border-red-900/30 rounded-[30px] p-8">

<h2 class="text-red-500 text-3xl font-black mb-8">

⚚ ENTER YOUR RITUAL CREDENTIALS

</h2>

<div class="space-y-6">

<div>

<label class="text-zinc-400 text-sm uppercase block mb-3">
Full Name
</label>

<input id="inputName"
type="text"
placeholder="sarthak"
oninput="updatePreview()"
class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-5 text-xl outline-none"/>

</div>

<div>

<label class="text-zinc-400 text-sm uppercase block mb-3">
X (Twitter) Username
</label>

<input id="inputX"
type="text"
placeholder="sarthakct"
oninput="handleXDetails()"
class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-5 text-xl outline-none"/>

</div>

<div>

<label class="text-zinc-400 text-sm uppercase block mb-3">
Discord ID
</label>

<input id="inputDiscord"
type="text"
placeholder="sarthak_pp"
oninput="updatePreview()"
class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-5 text-xl outline-none"/>

</div>

<div>

<label class="text-zinc-400 text-sm uppercase block mb-3">
Ritual Joining Date
</label>

<input id="inputDate"
type="date"
onchange="updatePreview()"
class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-5 text-xl outline-none"/>

</div>

<!-- ROLES -->

<div>

<label class="text-zinc-400 text-sm uppercase block mb-4">

Select Ritual Roles (Multiple)

</label>

<div class="grid grid-cols-2 gap-4">

<label class="border border-blue-500 rounded-2xl p-5 flex items-center gap-3 text-blue-400 text-2xl">

<input type="checkbox" value="Bitty" onchange="updateRoles()">

Bitty

</label>

<label class="border border-purple-500 rounded-2xl p-5 flex items-center gap-3 text-purple-400 text-2xl">

<input type="checkbox" value="Ritty" onchange="updateRoles()">

Ritty

</label>

<label class="border border-green-500 rounded-2xl p-5 flex items-center gap-3 text-green-400 text-2xl">

<input type="checkbox" value="Ritualist" onchange="updateRoles()">

Ritualist

</label>

<label class="border border-fuchsia-500 rounded-2xl p-5 flex items-center gap-3 text-fuchsia-400 text-2xl">

<input type="checkbox" value="Zealot" onchange="updateRoles()">

Zealot

</label>

<label class="border border-yellow-500 rounded-2xl p-5 flex items-center gap-3 text-yellow-400 text-2xl col-span-2">

<input type="checkbox" value="Radiant" onchange="updateRoles()">

Radiant Ritualist

</label>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="space-y-8">

<!-- LIVE CARD -->

<div id="livePreviewCard"
class="bg-black border border-red-600/40 rounded-[32px] p-8 relative overflow-hidden shadow-[0_0_60px_rgba(255,0,0,.12)]">

<div class="absolute inset-0 rounded-[32px] shadow-[0_0_80px_rgba(255,0,0,.1)]"></div>

<div class="flex items-center justify-between border-b border-red-900/30 pb-6">

<div class="flex items-center gap-5">

<div class="relative">

<div class="absolute inset-0 bg-red-500 blur-[16px] opacity-50 rounded-full"></div>

<img id="previewAvatar"
crossorigin="anonymous"
src="https://api.dicebear.com/7.x/bottts/png?seed=ritual"
class="relative w-24 h-24 rounded-full border-2 border-red-500 object-cover bg-black"/>

</div>

<div>

<h2 id="previewName"
class="text-5xl font-black">

sarthak

</h2>

<p id="previewX"
class="text-red-500 text-2xl mt-1">

@sarthakct

</p>

</div>

</div>

<div class="border border-red-500 rounded-2xl px-6 py-3 text-red-400 uppercase tracking-widest">

Ritual Testnet

</div>

</div>

<!-- INFO -->

<div class="grid grid-cols-2 gap-5 mt-8">

<div class="bg-zinc-950 border border-zinc-800 rounded-3xl p-6">

<div class="text-zinc-500 uppercase text-sm mb-4">

DISCORD HANDLE

</div>

<div class="flex items-center gap-3 text-3xl">

<i class="fa-brands fa-discord text-purple-400"></i>

<span id="previewDiscord">

sarthak_pp

</span>

</div>

</div>

<div class="bg-zinc-950 border border-zinc-800 rounded-3xl p-6">

<div class="text-zinc-500 uppercase text-sm mb-4">

RITUAL JOINING DATE

</div>

<div class="flex items-center gap-3 text-2xl">

<i class="fa-solid fa-calendar text-red-500"></i>

<span id="previewDate">

31 October, 2025

</span>

</div>

</div>

</div>

<!-- ROLES -->

<div class="mt-8">

<div class="text-center text-zinc-500 uppercase text-sm mb-5">

VERIFIED RITUAL ECOSYSTEM ROLES

</div>

<div id="previewRoles"
class="flex flex-wrap gap-4 justify-center">

</div>

</div>

</div>

<!-- BUTTON -->

<button onclick="mintOnChainCV()"
class="w-full bg-gradient-to-r from-red-700 to-red-500 hover:opacity-90 text-white text-3xl font-black py-6 rounded-3xl">

⛓️ MINT RITUAL ON-CHAIN CV

</button>

</div>

</main>

<!-- MODAL -->

<div id="statusModal"
class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-50 p-5">

<div class="w-full max-w-2xl bg-[#050505] border border-red-600/40 rounded-[32px] p-6 relative">

<button onclick="closeModal()"
class="absolute top-4 right-5 text-zinc-500 text-4xl">

×

</button>

<div class="text-center">

<div class="w-20 h-20 rounded-full bg-green-500/10 border border-green-500/30 flex items-center justify-center mx-auto mb-5">

<i class="fa-solid fa-circle-check text-green-500 text-5xl"></i>

</div>

<h2 class="text-5xl font-black text-green-400 mb-4">

🎉 CONGRATULATIONS!

</h2>

<p class="text-zinc-300 text-2xl">

Your Ritual CV has been minted successfully!

</p>

</div>

<!-- CARD -->

<div id="modalTargetCard"
class="mt-8">

</div>

<!-- BTN -->

<button onclick="downloadCardImage()"
class="mt-6 w-full bg-gradient-to-r from-green-600 to-emerald-500 text-white text-2xl font-black py-5 rounded-2xl">

⬇ DOWNLOAD RITUAL CARD (.PNG)

</button>

<button onclick="closeModal()"
class="mt-4 w-full bg-zinc-950 border border-zinc-800 text-white text-2xl py-5 rounded-2xl">

CLOSE

</button>

</div>

</div>

<script>

function updatePreview(){

const name =
document.getElementById('inputName').value || "sarthak";

const discord =
document.getElementById('inputDiscord').value || "sarthak_pp";

const date =
document.getElementById('inputDate').value;

document.getElementById('previewName').innerText = name;

document.getElementById('previewDiscord').innerText = discord;

if(date){

const formatted =
new Date(date).toLocaleDateString('en-US',{

year:'numeric',
month:'long',
day:'numeric'

});

document.getElementById('previewDate').innerText =
formatted;

}

}

async function handleXDetails(){

const user =
document.getElementById('inputX').value || "sarthakct";

document.getElementById('previewX').innerText =
`@${user}`;

try{

const url =
`https://unavatar.io/x/${user}`;

const response =
await fetch(url);

const blob =
await response.blob();

const reader =
new FileReader();

reader.onloadend = function(){

document.getElementById('previewAvatar').src =
reader.result;

};

reader.readAsDataURL(blob);

}catch(err){

document.getElementById('previewAvatar').src =
`https://api.dicebear.com/7.x/initials/png?seed=${user}`;

}

}

function updateRoles(){

const container =
document.getElementById('previewRoles');

container.innerHTML = "";

const roles =
document.querySelectorAll('input[type="checkbox"]:checked');

roles.forEach(role=>{

const badge =
document.createElement('div');

badge.className =
"role-badge";

if(role.value==="Bitty"){

badge.classList.add("border-blue-500","text-blue-400");

badge.innerHTML = "BITTY 💧";

}

if(role.value==="Ritty"){

badge.classList.add("border-purple-500","text-purple-400");

badge.innerHTML = "RITTY ✨";

}

if(role.value==="Ritualist"){

badge.classList.add("border-green-500","text-green-400");

badge.innerHTML = "RITUALIST 🔥";

}

if(role.value==="Zealot"){

badge.classList.add("border-fuchsia-500","text-fuchsia-400");

badge.innerHTML = "ZEALOT ⚡";

}

if(role.value==="Radiant"){

badge.classList.add("border-yellow-500","text-yellow-400");

badge.innerHTML = "👑 RADIANT RITUALIST 👑";

}

container.appendChild(badge);

});

}

function mintOnChainCV(){

const modal =
document.getElementById('statusModal');

modal.classList.remove('hidden');

modal.classList.add('flex');

const card =
document.getElementById('livePreviewCard').cloneNode(true);

card.id = "downloadCard";

document.getElementById('modalTargetCard').innerHTML = "";

document.getElementById('modalTargetCard').appendChild(card);

}

async function downloadCardImage(){

try{

const card =
document.getElementById('downloadCard');

const canvas =
await html2canvas(card,{

useCORS:true,

scale:3,

backgroundColor:"#050505"

});

const image =
canvas.toDataURL("image/png");

const link =
document.createElement('a');

const username =
document.getElementById('inputName').value || "ritual";

link.download =
`${username}_ritual_card.png`;

link.href =
image;

link.click();

}catch(err){

alert("Download failed");

console.log(err);

}

}

function closeModal(){

const modal =
document.getElementById('statusModal');

modal.classList.add('hidden');

modal.classList.remove('flex');

}

</script>

</body>
</html>
