<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ritual CV Website</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>

        body{
            font-family:'Space Grotesk',sans-serif;
            background:#050505;
        }

        .glow-red{
            box-shadow:0 0 20px rgba(239,68,68,.2);
        }

        .bg-grid{
            background-size:40px 40px;
            background-image:
            linear-gradient(to right,rgba(239,68,68,.05) 1px,transparent 1px),
            linear-gradient(to bottom,rgba(239,68,68,.05) 1px,transparent 1px);
        }

        .role-bitty{
            border-color:#3b82f6;
            color:#3b82f6;
        }

        .role-ritty{
            border-color:#a855f7;
            color:#a855f7;
        }

        .role-ritualist{
            border-color:#22c55e;
            color:#22c55e;
        }

        .role-zealot{
            border-color:#d946ef;
            color:#d946ef;
        }

        .role-radiant{
            border-color:#eab308;
            color:#eab308;
        }

    </style>
</head>

<body class="text-gray-100 min-h-screen bg-grid relative overflow-x-hidden pb-12">

<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[250px] bg-red-600/10 blur-[60px] pointer-events-none rounded-full"></div>

<header class="border-b border-red-900/40 bg-black/60 backdrop-blur-md sticky top-0 z-50 px-4 py-3 sm:px-8">

    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">

        <div class="flex items-center gap-3">

            <div class="w-10 h-10 bg-black border border-red-600 rounded-lg p-1.5 flex items-center justify-center shadow-[0_0_15px_rgba(239,68,68,0.3)]">

                <svg viewBox="0 0 100 100" class="w-full h-full fill-none stroke-white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">

                    <path d="M50 10 L90 50 L50 90 L10 50 Z"/>

                    <path d="M35 35 L65 65 M65 35 L35 65"/>

                </svg>

            </div>

            <h1 class="text-xl sm:text-2xl font-bold tracking-wider text-white">
                RITUAL <span class="text-red-500">CV WEBSITE</span>
            </h1>

        </div>

        <button id="connectWalletBtn"
            onclick="connectWallet()"
            class="px-5 py-2 bg-transparent border border-red-600 hover:bg-red-600/20 text-red-500 hover:text-white rounded-xl font-medium transition-all duration-300 text-sm sm:text-base">

            <i class="fa-solid fa-wallet mr-2"></i>
            Connect Wallet

        </button>

    </div>

</header>

<main class="max-w-7xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">

<section class="lg:col-span-5 bg-black/80 border border-zinc-800/80 rounded-2xl p-6 glow-red">

<h2 class="text-lg font-semibold text-red-500 mb-6 flex items-center gap-2 border-b border-zinc-800 pb-3">
<i class="fa-solid fa-sliders text-sm"></i>
Enter Your Ritual Credentials
</h2>

<div class="space-y-5">

<div>

<label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">
Full Name
</label>

<input type="text"
id="inputName"
oninput="updatePreview()"
placeholder="sarthak"
class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-3 text-white"/>

</div>

<div>

<label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">
X (Twitter) Username
</label>

<div class="relative">

<span class="absolute left-4 top-3.5 text-zinc-500">@</span>

<input type="text"
id="inputX"
oninput="handleXDetails()"
placeholder="sarthakct"
class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl pl-9 pr-4 py-3 text-white"/>

</div>

</div>

<div>

<label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">
Discord ID
</label>

<input type="text"
id="inputDiscord"
oninput="updatePreview()"
placeholder="sarthak_pp"
class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-3 text-white"/>

</div>

<div>

<label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">
Ritual Joining Date
</label>

<input type="date"
id="inputDate"
onchange="updatePreview()"
class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-4 py-3 text-white"/>

</div>

<div>

<label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-3">
Select Ritual Roles
</label>

<div class="grid grid-cols-2 gap-3">

<label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-xl p-3 cursor-pointer">
<input type="checkbox" value="Bitty" onchange="updateRoles()">
<span class="text-blue-400">Bitty</span>
</label>

<label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-xl p-3 cursor-pointer">
<input type="checkbox" value="Ritty" onchange="updateRoles()">
<span class="text-purple-400">Ritty</span>
</label>

<label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-xl p-3 cursor-pointer">
<input type="checkbox" value="Ritualist" onchange="updateRoles()">
<span class="text-green-400">Ritualist</span>
</label>

<label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-xl p-3 cursor-pointer">
<input type="checkbox" value="Zealot" onchange="updateRoles()">
<span class="text-fuchsia-400">Zealot</span>
</label>

<label class="flex items-center gap-3 bg-zinc-950 border border-zinc-800 rounded-xl p-3 cursor-pointer col-span-2">
<input type="checkbox" value="Radiant" onchange="updateRoles()">
<span class="text-yellow-500">Radiant Ritualist</span>
</label>

</div>

</div>

</div>

</section>

<section class="lg:col-span-7 flex flex-col justify-between gap-6">

<div id="livePreviewCard"
class="w-full bg-zinc-950 border-2 border-red-950 rounded-3xl p-6 sm:p-8 relative overflow-hidden">

<div class="flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-zinc-900 pb-6">

<div class="flex items-center gap-4">

<div class="relative">

<img id="previewAvatar"
crossorigin="anonymous"
src="https://api.dicebear.com/7.x/bottts/png?seed=ritual"
class="w-20 h-20 rounded-full border-2 border-red-500 bg-black object-cover"/>

</div>

<div>

<h3 id="previewName"
class="text-2xl font-bold text-white tracking-wide">
Sarthak
</h3>

<p id="previewX"
class="text-sm text-red-500 font-medium font-mono">
@sarthakct
</p>

</div>

</div>

<div class="bg-red-950/40 border border-red-800/60 rounded-xl px-4 py-1.5 text-center">

<span class="text-xs uppercase tracking-widest text-red-400 font-semibold">
Ritual Testnet
</span>

</div>

</div>

<div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-6">

<div class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-4">

<span class="block text-xs font-semibold text-zinc-500 uppercase mb-1">
Discord Handle
</span>

<div class="text-zinc-200 font-medium">
<span id="previewDiscord">—</span>
</div>

</div>

<div class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-4">

<span class="block text-xs font-semibold text-zinc-500 uppercase mb-1">
Ritual Joining Date
</span>

<div class="text-zinc-200 font-medium">
<span id="previewDate">—</span>
</div>

</div>

</div>

<div class="mt-6">

<span class="block text-xs font-semibold text-zinc-500 uppercase mb-3">
Verified Ritual Ecosystem Roles
</span>

<div id="previewRolesContainer"
class="flex flex-wrap gap-3 min-h-[44px] items-center p-3 bg-zinc-900/20 border border-dashed border-zinc-800 rounded-xl">

<p id="noRolesText"
class="text-xs text-zinc-600 italic">
No roles selected yet
</p>

</div>

</div>

</div>

<button onclick="downloadCardImage()"
class="w-full bg-gradient-to-r from-green-600 to-emerald-500 text-white font-bold py-4 rounded-2xl">

DOWNLOAD RITUAL CARD (.PNG)

</button>

</section>

</main>

<script>

let base64AvatarData = "";

function updatePreview(){

    const name = document.getElementById('inputName').value.trim();

    const discord = document.getElementById('inputDiscord').value.trim();

    const date = document.getElementById('inputDate').value;

    document.getElementById('previewName').innerText = name || "Sarthak";

    document.getElementById('previewDiscord').innerText = discord || "—";

    if(date){

        const formattedDate = new Date(date).toLocaleDateString('en-US',{
            year:'numeric',
            month:'long',
            day:'numeric'
        });

        document.getElementById('previewDate').innerText = formattedDate;

    }else{

        document.getElementById('previewDate').innerText = "—";

    }

}

async function handleXDetails(){

    const xUser = document.getElementById('inputX').value.trim();

    const previewX = document.getElementById('previewX');

    const previewAvatar = document.getElementById('previewAvatar');

    if(!xUser){

        previewX.innerText = "@sarthakct";

        previewAvatar.src = "https://api.dicebear.com/7.x/bottts/png?seed=ritual";

        return;

    }

    previewX.innerText = `@${xUser}`;

    try{

        const avatarUrl = `https://unavatar.io/x/${xUser}`;

        const response = await fetch(avatarUrl);

        if(!response.ok){
            throw new Error("avatar failed");
        }

        const blob = await response.blob();

        const reader = new FileReader();

        reader.onloadend = function(){

            base64AvatarData = reader.result;

            previewAvatar.src = base64AvatarData;

        }

        reader.readAsDataURL(blob);

    }catch(error){

        console.log(error);

        previewAvatar.src =
        `https://api.dicebear.com/7.x/initials/png?seed=${xUser}`;

    }

}

function updateRoles(){

    const checkboxes =
    document.querySelectorAll('input[type="checkbox"]');

    const container =
    document.getElementById('previewRolesContainer');

    container.innerHTML = "";

    let count = 0;

    checkboxes.forEach(cb=>{

        if(cb.checked){

            count++;

            const badge = document.createElement('span');

            badge.className =
            "px-3 py-1 text-xs font-bold border rounded-lg tracking-wide uppercase";

            if(cb.value==="Bitty") badge.classList.add('role-bitty');

            if(cb.value==="Ritty") badge.classList.add('role-ritty');

            if(cb.value==="Ritualist") badge.classList.add('role-ritualist');

            if(cb.value==="Zealot") badge.classList.add('role-zealot');

            if(cb.value==="Radiant") badge.classList.add('role-radiant');

            badge.innerText = cb.value;

            container.appendChild(badge);

        }

    });

    if(count===0){

        container.innerHTML =
        `<p class="text-xs text-zinc-600 italic">No roles selected yet</p>`;

    }

}

async function downloadCardImage(){

    const targetCard =
    document.getElementById('livePreviewCard');

    try{

        const elements = targetCard.querySelectorAll('*');

        elements.forEach(el=>{

            el.style.animation='none';

            el.style.transition='none';

        });

        const canvas = await html2canvas(targetCard,{

            backgroundColor:"#050505",

            scale:2,

            useCORS:true,

            allowTaint:false,

            logging:false

        });

        const image = canvas.toDataURL("image/png",1.0);

        const link = document.createElement('a');

        const nameInput =
        document.getElementById('inputName').value.trim() || "ritual";

        link.download = `${nameInput}_ritual_card.png`;

        link.href = image;

        document.body.appendChild(link);

        link.click();

        document.body.removeChild(link);

    }catch(err){

        console.log(err);

        alert("Download failed");

    }

}

async function connectWallet(){

    if(!window.ethereum){

        alert("Please install MetaMask");

        return;

    }

    try{

        const provider =
        new ethers.BrowserProvider(window.ethereum);

        const accounts =
        await provider.send("eth_requestAccounts",[]);

        const address = accounts[0];

        document.getElementById('connectWalletBtn').innerHTML =
        `${address.slice(0,6)}...${address.slice(-4)}`;

    }catch(err){

        console.log(err);

    }

}

</script>

</body>
</html>
